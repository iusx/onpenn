<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#fdf8f0"/>
  <!-- Panel border (double) -->
  <rect x="4" y="4" width="392" height="292" fill="none" stroke="#d4a843" stroke-width="3" rx="4"/>
  <rect x="10" y="10" width="380" height="280" fill="none" stroke="#d4a843" stroke-width="1.5" rx="2"/>

  <!-- Simple smiley face character -->
  <circle cx="200" cy="140" r="55" fill="#FFD700" stroke="#333" stroke-width="2.5"/>
  <!-- Eyes -->
  <circle cx="183" cy="125" r="7" fill="#333"/>
  <circle cx="217" cy="125" r="7" fill="#333"/>
  <!-- Eye shine -->
  <circle cx="186" cy="122" r="2.5" fill="white"/>
  <circle cx="220" cy="122" r="2.5" fill="white"/>
  <!-- Smile -->
  <path d="M 176 155 Q 200 178 224 155" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Caption area -->
  <rect x="10" y="258" width="380" height="32" fill="#fff8e7" rx="0"/>
  <text x="200" y="279" text-anchor="middle" font-size="12" fill="#b45309" font-family="sans-serif" font-weight="600">
    Add comic image to /public/comics/
  </text>
</svg>
