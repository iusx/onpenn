\":[\"__PAGE__?{\\\"locale\\\":\\\"zh\\\"}\",{}]}]}]},\"$undefined\",\"$undefined\",true],\"initialSeedData\":[\"\",{\"children\":[[\"locale\",\"zh\",\"d\"],{\"children\":[\"comics\",{\"children\":[\"__PAGE__\",{},[[\"$L3\",[\"$\",\"div\",null,{\"className\":\"page\",\"style\":{\"alignItems\":\"flex-start\",\"maxWidth\":640,\"margin\":\"0 auto\"},\"children\":[[\"$\",\"div\",null,{\"className\":\"nav-bar\",\"children\":[[\"$\",\"$L4\",null,{\"href\":\"/zh\",\"children\":[\"← \",\"返回首页\"]}],[\"$\",\"b\",null,{\"children\":\"全部漫画\"}],[\"$\",\"$L5\",null,{\"currentLocale\":\"zh\"}]]}],[\"$\",\"$L6\",null,{\"comics\":[{\"id\":\"tuesday-photo\",\"image\":\"/comics/telegram-cloud-photo-size-2-5339359817925071876-y.jpg\",\"author\":\"Mark Parisi\",\"source\":\"onpenn\",\"date\":\"2026-03-30\",\"sourceLanguage\":\"ru\",\"translations\":{\"zh\":{\"title\":\"你看起来跟你的照片不像。\",\"fontFamily\":\"Yozai-Medium\",\"explanation\":\"漫画巧妙地结合了网恋“照骗”的梗与香蕉保鲜期极短的自然特性，幽默地调侃了香蕉仅仅过了几天（星期二拍的）就从新鲜亮黄变得布满黑斑、判若两人的夸张反差。\",\"bubbles\":[{\"id\":\"b1\",\"text\":\"你看起来跟你的照片不像。\",\"position\":\"left\",\"x\":23.8,\"y\":18.4,\"w\":43.6,\"h\":16.8,\"fontSize\":1.5,\"bg\":\"rgba(255,255,255,1)\"},{\"id\":\"b2\",\"text\":\"那是星期二拍的。\",\"position\":\"right\",\"x\":78.8,\"y\":19.4,\"w\":33,\"h\":14.4,\"fontSize\":1.5,\"bg\":\"rgba(255,255,255,1)\"}]},\"en\":{\"title\":\"You Don't Look Like Your Photo.\",\"fontFamily\":\"'Comic Sans MS', cursive\",\"explanation\":\"This comic humorously combines the 'catfishing' trope of online dating with the natural characteristic of bananas having a very short shelf life. It jokes about how a banana can look fresh and bright yellow in a photo taken on Tuesday, but just a few days later it becomes covered in black spots and looks completely different, exaggerating the contrast for comedic effect.\",\"bubbles\":[{\"id\":\"b1\",\"text\":\"You don't look like your photo.\",\"position\":\"left\",\"x\":23.8,\"y\":18.4,\"w\":43.6,\"h\":16.8,\"fontSize\":1.5,\"bg\":\"rgba(255,255,255,1)\"},{\"id\":\"b2\",\"text\":\"That was on Tuesday.\",\"position\":\"right\",\"x\":78.8,\"y\":19.4,\"w\":33,\"h\":14.4,\"fontSize\":1.5,\"bg\":\"rgba(255,255,255,1)\"}]}}},{\"id\":\"clownfish\",\"image\":\"/comics/telegram-cloud-photo-size-2-5339359817925071877-y.jpg\",\"author\":\"Dave Whamond\",\"source\":\"onpenn\",\"date\":\"2026-03-30\",\"sourceLanguage\":\"ru\",\"translations\":{\"zh\":{\"title\":\"那里没什么可怕的。只不过是一条小丑鱼而已！\",\"explanation\":\"漫画巧妙地利用了“小丑鱼”的双关语，将原本可爱无害的海洋生物替换成了《小丑回魂》中举着红气球躲在暗处的恐怖小丑（Pennywise），通过鱼儿对致命危险浑然不觉却强作镇定的台词制造了极具荒诞感的惊悚笑点。\",\"bubbles\":[{\"id\":\"b1\",\"text\":\"那里没什么可怕的。只不过是一条小丑鱼而已！\",\"position\":\"left\",\"x\":69.3,\"y\":18.8,\"w\":45.4,\"h\":19,\"fontSize\":2.2,\"bg\":\"rgba(255,255,255,1)\",\"fontFamily\":\"Yozai-Medium\"}]},\"en\":{\"title\":\"There's nothing to be afraid of. It's just a clownfish!\",\"explanation\":\"This comic cleverly plays on the double meaning of 'clownfish,' replacing the originally cute and harmless marine creature with the terrifying clown (Pennywise) from 'It,' who hides in the shadows holding a red balloon. The humor arises from the absurdity of the fish being completely oblivious to the deadly danger it is in, while trying to act nonchalant with its line.\",\"bubbles\":[{\"id\":\"b1\",\"text\":\"There's nothing to be afraid of. It's just a clownfish!\",\"position\":\"left\",\"x\":69.6,\"y\":18.7,\"w\":45.4,\"h\":20.6,\"fontSize\":2.1,\"bg\":\"rgba(255,255,255,1)\",\"fontFamily\":\"\\\"Comic Sans MS\\\", cursive\"}]}}},{\"id\":\"square-cat\",\"image\":\"/comics/telegram-cloud-photo-size-2-5339359817925071866-y.jpg\",\"author\":\"Mark Parisi\",\"source\":\"onpenn\",\"date\":\"2026-03-31\",\"sourceLanguage\":\"ru\",\"translations\":{\"zh\":{\"title\":\"纸箱综合征\",\"fontFamily\":\"Yozai-Medium\",\"explanation\":\"猫咪因为在纸箱里待了太长时间，整个身体都已经变成了方形。“纸箱综合征”是网络上调侃猫咪过度依赖纸箱的幽默说法，暗指猫咪因为长时间待在纸箱里而产生的各种“症状”。漫画中的猫咪已经完全变成了一个方形，夸张地表现了这个梗。\",\"bubbles\":[{\"id\":\"b1\",\"text\":\"不，我不觉得我在盒子里待的时间太长了。(纸箱综合征)\",\"position\":\"left\",\"x\":51,\"y\":15.8,\"w\":92.2,\"h\":15,\"fontSize\":1.9,\"bg\":\"rgba(255,255,255,1)\",\"fontFamily\":\"Yozai-Medium\"}]},\"en\":{\"title\":\"Box Syndrome\",\"explanation\":\"Box Syndrome is a humorous internet term referring to cats who spend so much time in boxes that they start to exhibit 'symptoms' of it. The joke is that the cat has been in the box for so long that it has become completely square-shaped, exaggerating the idea of 'Box Syndrome'.\",\"bubbles\":[{\"id\":\"b1\",\"text\":\"No, I don't think I spend too much time in boxes.(Box Syndrome)\",\"position\":\"left\",\"x\":49.9,\"y\":16,\"w\":92.4,\"h\":15,\"fontSize\":1.9,\"bg\":\"rgba(255,255,255,1)\",\"fontFamily\":\"\\\"Comic Sans MS\\\", cursive\"}]}}},{\"id\":\"late-bloomer\",\"image\":\"/comics/telegram-cloud-photo-size-1-5064766272175803348-y.jpg\",\"author\":\"ToonHole\",\"source\":\"@LangRenNews6324\",\"date\":\"2026-04-01\",\"sourceLanguage\":\"en\",\"translations\":{\"en\":{\"title\":\"Late Bloomer\",\"bubbles\":[]},\"zh\":{\"explanation\":\"漫画巧妙地利用了英语词组“late bloomer”（指大器晚成或开窍晚的人，字面意思是“晚开花的人/植物”）的双关语。父母在儿子一生平庸、一事无成时，一直用这句话自我安慰。直到儿子去世后很久，他光秃秃的坟前才终于开出了小花，用一种地狱笑话式的方式实现了字面意义上的“开花晚（late bloomer）”。\",\"title\":\"大器晚成\",\"bubbles\":[{\"id\":\"b1\",\"text\":\"也许他只是大器晚成。\",\"position\":\"left\",\"x\":25.3,\"y\":4,\"w\":35.2,\"h\":3.4,\"fontSize\":0.8,\"bg\":\"rgba(255,255,255,1)\",\"fontFamily\":\"Yozai-Medium\"},{\"id\":\"b2\",\"text\":\"也许他只是大器晚成。\",\"position\":\"left\",\"x\":73,\"y\":4,\"w\":34.6,\"h\":3.8,\"fontSize\":0.8,\"bg\":\"rgba(255,255,255,1)\",\"fontFamily\":\"Yozai-Medium\"},{\"id\":\"b3\",\"text\":\"沉淀，大器晚成\",\"position\":\"left\",\"x\":24.9,\"y\":28.4,\"w\":35.2,\"h\":3.8,\"fontSize\":0.8,\"bg\":\"rgba(255,255,255,1)\",\"fontFamily\":\"Yozai-Medium\"},{\"id\":\"b4\",\"text\":\"也许他只是大器晚成。\",\"position\":\"left\",\"x\":74.1,\"y\":28.5,\"w\":34.2,\"h\":3.8,\"fontSize\":0.7,\"bg\":\"rgba(255,255,255,1)\",\"fontFamily\":\"Yozai-Medium\"}]}}},{\"id\":\"dog-acting-class\",\"image\":\"/comics/teleg
